[phases.setup]
nixPkgs = [
  "python311",
  "glib",
  "nss",
  "nspr",
  "atk",
  "at-spi2-atk",
  "cups",
  "dbus",
  "expat",
  "libdrm",
  "mesa",
  "xcbutil",
  "xorg.libX11",
  "xorg.libXcomposite",
  "xorg.libXdamage",
  "xorg.libXext",
  "xorg.libXfixes",
  "xorg.libxcb",
  "xorg.libXrandr",
  "xorg.libxshmfence",
  "xorg.libXtst",
  "pango",
  "cairo",
  "alsa-lib",
  "libxkbcommon",
  "gtk3"
]

[phases.install]
cmds = [
  "pip install -r requirements.txt",
  "python -m playwright install chromium"
]

[start]
cmd = "python scanner.py"
